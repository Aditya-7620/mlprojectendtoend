<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Performance Predictor</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .container {
            background: white;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            max-width: 500px;
            width: 100%;
        }
        h1 {
            text-align: center;
            color: #333;
            margin-bottom: 30px;
            font-size: 28px;
        }
        .form-group {
            margin-bottom: 20px;
        }
        label {
            display: block;
            margin-bottom: 8px;
            color: #555;
            font-weight: 600;
        }
        select, input {
            width: 100%;
            padding: 12px;
            border: 2px solid #e1e5e9;
            border-radius: 10px;
            font-size: 16px;
            transition: border-color 0.3s;
        }
        select:focus, input:focus {
            outline: none;
            border-color: #667eea;
        }
        .btn {
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 18px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s;
        }
        .btn:hover {
            transform: translateY(-2px);
        }
        .result {
            margin-top: 25px;
            padding: 20px;
            border-radius: 10px;
            text-align: center;
            font-size: 24px;
            font-weight: bold;
        }
        .result.high { background: #d4edda; color: #155724; }
        .result.medium { background: #fff3cd; color: #856404; }
        .result.low { background: #f8d7da; color: #721c24; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎓 Student Performance Predictor</h1>
        
        <form action="/predictdata" method="POST">
            <!-- Gender -->
            <div class="form-group">
                <label for="gender">Gender:</label>
                <select name="gender" id="gender" required>
                    <option value="">Select Gender</option>
                    <option value="male">Male</option>
                    <option value="female">Female</option>
                </select>
            </div>

            <!-- Race/Ethnicity -->
            <div class="form-group">
                <label for="ethnicity">Race/Ethnicity:</label>
                <select name="ethnicity" id="ethnicity" required>
                    <option value="">Select Ethnicity</option>
                    <option value="group A">Group A</option>
                    <option value="group B">Group B</option>
                    <option value="group C">Group C</option>
                    <option value="group D">Group D</option>
                    <option value="group E">Group E</option>
                </select>
            </div>

            <!-- Parental Level of Education -->
            <div class="form-group">
                <label for="parental_level_of_education">Parental Level of Education:</label>
                <select name="parental_level_of_education" id="parental_level_of_education" required>
                    <option value="">Select Education Level</option>
                    <option value="associate's degree">Associate's Degree</option>
                    <option value="bachelor's degree">Bachelor's Degree</option>
                    <option value="high school">High School</option>
                    <option value="master's degree">Master's Degree</option>
                    <option value="some college">Some College</option>
                    <option value="some high school">Some High School</option>
                </select>
            </div>

            <!-- Lunch -->
            <div class="form-group">
                <label for="lunch">Lunch:</label>
                <select name="lunch" id="lunch" required>
                    <option value="">Select Lunch</option>
                    <option value="standard">Standard</option>
                    <option value="free/reduced">Free/Reduced</option>
                </select>
            </div>

            <!-- Test Preparation Course -->
            <div class="form-group">
                <label for="test_preparation_course">Test Preparation Course:</label>
                <select name="test_preparation_course" id="test_preparation_course" required>
                    <option value="">Select</option>
                    <option value="none">None</option>
                    <option value="completed">Completed</option>
                </select>
            </div>

            <!-- Reading Score -->
            <div class="form-group">
                <label for="reading_score">Reading Score (0-100):</label>
                <input type="number" name="reading_score" id="reading_score" min="0" max="100" required>
            </div>

            <!-- Writing Score -->
            <div class="form-group">
                <label for="writing_score">Writing Score (0-100):</label>
                <input type="number" name="writing_score" id="writing_score" min="0" max="100" required>
            </div>

            <button type="submit" class="btn">🔮 Predict Math Score</button>
        </form>

        {% if results is defined %}
        <div class="result {% if results >= 80 %}high{% elif results >= 60 %}medium{% else %}low{% endif %}">
            Predicted Math Score: {{ results | round(2) }}/100
        </div>
        {% endif %}
    </div>
</body>
</html>
